{% extends "base.html" %}
{% block title %}Resources · DigiLiteracy{% endblock %}
{% block content %}
<section class="container">
  <h2 class="section-title">Learning Resources</h2>
  <p class="section-sub">Trusted, free resources to continue your digital literacy journey.</p>
  <div class="grid">
    {% for r in resources %}
    <div class="card fade-in">
      <div class="card-icon">🔗</div>
      <h3>{{ r.title }}</h3>
      <p>{{ r.desc }}</p>
      <a class="link" href="{{ r.url }}" target="_blank" rel="noopener">Visit website →</a>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
